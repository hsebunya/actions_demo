#this is am empty workflow for demonstration in class
name: ci 
on:
  push:
     branches: [master]
jobs:
   test:
       runs-on: ubuntu-latest
       steps:
         - name: checkout
           uses: actions/checkout@v6
         - name: Set up node.js
           uses: actions/setup-node@v6
           with:
             node-version: '24'
         - run: npm install
         - run: npm test
         
